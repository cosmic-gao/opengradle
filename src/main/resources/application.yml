server:
  port: 9999

spring:
  application:
    name: opengradle
  main:
    web-application-type: reactive

  # Nacos: configuration + service discovery.
  # `spring.config.import` replaces bootstrap.yml on Spring Cloud 2020+ — only the
  # listed dataIds are pulled, and `optional:` means startup does not fail when
  # Nacos is unreachable (handy for local dev). Remove `optional:` in production.
  config:
    import:
      - optional:nacos:opengradle.yaml

  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        file-extension: yaml
        refresh-enabled: true
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos

    loadbalancer:
      ribbon:
        enabled: false
    gateway:
      # Routes are typically sourced from Nacos (opengradle.yaml dataId).
      # The example route below is for verifying the AuthFilter intercepts —
      # AuthFilter only fires for requests that match a route, so without any
      # routes configured all requests just 404 and the filter never runs.
      # Replace `lb://example-service` with your real service name.
      routes:
        - id: example_route
          uri: lb://example-service
          predicates:
            - Path=/example/**
          filters:
            - StripPrefix=1

  codec:
    max-in-memory-size: 10MB
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'

# Whitelist regexes bypass the AuthFilter (path is matched with the leading "/" stripped).
gateway:
  whitelist:
    - actuator/.*

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,refresh
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true

logging:
  level:
    "[com.opengradle]": debug
    "[org.springframework.cloud.gateway]": info
