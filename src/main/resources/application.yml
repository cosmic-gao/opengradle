server:
  port: 9999

spring:
  application:
    name: opengradle
  main:
    web-application-type: reactive

  # Nacos:配置中心 + 服务发现。
  # Spring Cloud 2020+ 用 `spring.config.import` 取代 bootstrap.yml,只拉取下面列出的
  # dataId;`optional:` 表示 Nacos 不可达时不阻断启动(本地开发友好),生产环境去掉。
  config:
    import:
      - optional:nacos:opengradle.yaml

  cloud:
    nacos:
      config:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        file-extension: yaml
        refresh-enabled: true
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos

    gateway:
      # 路由通常通过 Nacos(opengradle.yaml dataId)下发。
      # 下面这条示例路由的存在意义是让 AuthFilter 能被触发 ——
      # 如果一条路由都没匹配上,请求会直接 404,过滤器根本不会执行。
      # 把 `lb://example-service` 换成你真正要代理的服务名即可。
      routes:
        - id: example_route
          uri: lb://example-service
          predicates:
            - Path=/example/**
          filters:
            - StripPrefix=1

  codec:
    max-in-memory-size: 10MB
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'

# 白名单正则(去掉路径前导 "/" 后做正则匹配),命中则绕过 AuthFilter。
gateway:
  whitelist:
    - actuator/.*

# Actuator 端点暴露
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,refresh
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true

logging:
  level:
    "[com.opengradle]": debug
    "[org.springframework.cloud.gateway]": info
