# =========================================================================
# Nacos dataId: opengradle.yaml
# Group:        DEFAULT_GROUP
# Description:  Runtime config for the opengradle gateway. Properties here
#               override the matching defaults in application.yml and benefit
#               from hot reload (no restart needed).
#
# Upload via:
#   1. Nacos console → Configuration Management → Configurations → "+"
#   2. dataId:    opengradle.yaml
#   3. group:     DEFAULT_GROUP
#   4. format:    YAML
#   5. content:   paste the YAML below
# =========================================================================

# Spring Cloud Gateway routes (hot-reloadable).
spring:
  cloud:
    gateway:
      routes:
        # Sample httpbin route — replace with your real services.
        - id: httpbin_route
          uri: https://httpbin.org
          predicates:
            - Path=/httpbin/**
          filters:
            - StripPrefix=1

        # Example: a downstream service registered to Nacos.
        # - id: example_route
        #   uri: lb://example-service
        #   predicates:
        #     - Path=/example/**
        #   filters:
        #     - StripPrefix=1

# Bypass the AuthFilter for these URI regexes (path with leading "/" stripped).
# Add/remove without restarting — WhiteListConfiguration is @RefreshScope.
gateway:
  whitelist:
    - actuator/.*
    - auth/login

# Auth settings (hot-reloadable via AuthConfiguration).
auth:
  # Token TTL in seconds. Take effect on the NEXT login (existing tokens keep
  # their original expiry as stored in Redis).
  token-ttl-seconds: 7200
